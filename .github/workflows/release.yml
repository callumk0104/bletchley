name: Release

# Push a version tag (e.g. v0.2.0) to build, sign, and publish a release
# with the NSIS installer + the updater manifest (latest.json).
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Generated with `npm run tauri signer generate` — store as repo secrets.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TimeTracker ${{ github.ref_name }}"
          releaseBody: "Download the `-setup.exe` to install. Existing installs update automatically."
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
